<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flinto Admissions Intelligence Report</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171f2a; --panel2:#1d2735; --line:#2a3645;
    --txt:#e6edf3; --mut:#8b9bb0; --accent:#4ea1ff; --accent2:#36c692;
    --warn:#f2b441; --bad:#f25c54; --chip:#243043; --chipon:#1f6feb;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif;font-size:14px}
  header{padding:18px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#19222f,#121821)}
  h1{margin:0;font-size:20px;letter-spacing:.3px}
  .sub{color:var(--mut);font-size:12.5px;margin-top:4px}
  .wrap{padding:18px 24px;max-width:1500px;margin:0 auto}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .05s}
  .kpi:hover{border-color:var(--accent)}
  .kpi:active{transform:scale(.98)}
  .kpi .v{font-size:26px;font-weight:700}
  .kpi .l{color:var(--mut);font-size:12px;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
  .kpi .sub2{color:var(--mut);font-size:11px;margin-top:3px}
  .kpi.acc .v{color:var(--accent)} .kpi.grn .v{color:var(--accent2)} .kpi.wrn .v{color:var(--warn)} .kpi.bad .v{color:var(--bad)}
  .filters{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:18px}
  .filters h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);display:flex;justify-content:space-between;align-items:center}
  .fgrid{display:flex;flex-wrap:wrap;gap:22px;align-items:flex-start}
  .fgroup{min-width:180px}
  .fgroup .ft{font-weight:600;font-size:12.5px;margin-bottom:7px;color:#c7d3e0}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--txt);border-radius:14px;padding:3px 10px;font-size:12px;cursor:pointer;user-select:none;white-space:nowrap}
  .chip .n{color:var(--mut);font-size:10.5px;margin-left:4px}
  .chip.on{background:var(--chipon);border-color:var(--accent);color:#fff}
  .chip.on .n{color:#dbe8ff}
  .dates{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dates input{padding:6px 8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:12.5px;color-scheme:dark}
  .dates span{color:var(--mut);font-size:12px}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12.5px}
  .btn:hover{border-color:var(--accent)}
  .right{min-width:0}
  .charts{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .card h4{margin:0 0 12px;font-size:13px;color:#c7d3e0;display:flex;justify-content:space-between}
  .bar{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;cursor:pointer;border-radius:5px;padding:1px 2px}
  .bar:hover{background:#1a2330}
  .bar .lab{width:120px;color:var(--mut);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar:hover .lab{color:var(--txt)}
  .bar .track{flex:1;background:var(--panel2);border-radius:5px;height:16px;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px}
  .bar .val{width:54px;text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .tbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
  .tbar .ct{color:var(--mut);font-size:12.5px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{position:sticky;top:0;background:var(--panel2);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;color:#c7d3e0}
  th:hover{color:#fff}
  td{padding:7px 10px;border-bottom:1px solid #202a37;vertical-align:top}
  tr:hover td{background:#1a2330}
  .scroll{max-height:560px;overflow:auto}
  .pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;white-space:nowrap}
  .pill.enr{background:#103a2c;color:#4fe0a4;border:1px solid #1c5e45}
  .pill.lost{background:#3a1816;color:#f59189;border:1px solid #5e2823}
  .pill.dq{background:#332a12;color:#f2c879;border:1px solid #5e4d22}
  .pill.fu{background:#13283d;color:#79b8f2;border:1px solid #224a6e}
  .pill.oth{background:#262f3d;color:#aab8c9;border:1px solid #38465a}
  .yes{color:var(--accent2);font-weight:600}.no{color:var(--mut)}
  .muted{color:var(--mut)}
  .overlay{position:fixed;inset:0;background:rgba(4,8,14,.72);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:100%;max-width:1100px;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 18px 60px rgba(0,0,0,.5)}
  .mhead{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .mhead h3{margin:0;font-size:15px}
  .mhead .x{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1}
  .mhead .x:hover{border-color:var(--accent)}
  .mbody{overflow:auto;padding:0}
  .mbody table{font-size:12px}
  @media(max-width:1000px){.charts{grid-template-columns:1fr}}
</style>
</head>

<header>

    </div>
  </section>
  <main class="right">
    <div class="kpis" id="kpis"></div>
    <div class="charts" id="charts"></div>
    <div class="tablewrap">
      <div class="tbar">
        <div class="ct" id="tcount"></div>
        <div class="ct">Click a column header to sort</div>
      </div>
      <div class="scroll">
        <table id="tbl"><thead></thead><tbody></tbody></table>
      </div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead"><h3 id="m-title">Leads</h3><button class="x" id="m-close">&times;</button></div>
    <div class="mbody scroll"><table id="m-tbl"><thead></thead><tbody></tbody></table></div>
  </div>
</div>

  const all=document.createElement("span"); all.className="chip"+(state[key].size===0?" on":"");
  all.innerHTML=`All<span class="n">${DATA.length}</span>`;
  all.onclick=()=>{ state[key].clear(); buildChips(hostId,key); render(); };
  host.appendChild(all);
  uniqCounts(key).forEach(([v,n])=>{
    const c=document.createElement("span"); c.className="chip"+(state[key].has(v)?" on":"");
    c.innerHTML=`${v}<span class="n">${n}</span>`;
    c.onclick=()=>{ state[key].has(v)?state[key].delete(v):state[key].add(v); buildChips(hostId,key); render(); };
    host.appendChild(c);
  });
}
function iso(d){return d.toISOString().slice(0,10);}
function buildDatePresets(){
  const host=document.getElementById("f-datepreset"); host.innerHTML="";
  const presets=[
    ["All", ()=>["",""]],
    ["Today", ()=>{const n=new Date();return [iso(n),iso(n)];}],
    ["Yesterday", ()=>{const n=new Date();n.setDate(n.getDate()-1);return [iso(n),iso(n)];}],
    ["This month", ()=>{const n=new Date();return [iso(new Date(n.getFullYear(),n.getMonth(),1)),iso(new Date())];}],
    ["Last 3 months", ()=>{const n=new Date();return [iso(new Date(n.getFullYear(),n.getMonth()-2,1)),iso(new Date())];}],
    ["This year", ()=>{const n=new Date();return [iso(new Date(n.getFullYear(),0,1)),iso(new Date())];}],
  ];
  presets.forEach(([label,fn])=>{
    const c=document.createElement("span"); c.className="chip"+(label==="All"?" on":"");
    c.textContent=label;
    c.onclick=()=>{ const r=fn(); state.from=r[0]; state.to=r[1];
      document.getElementById("date-from").value=r[0]; document.getElementById("date-to").value=r[1];
      [...host.children].forEach(x=>x.classList.remove("on")); c.classList.add("on"); render(); };
    host.appendChild(c);
  });
}
function clearPresetHighlight(){[...document.getElementById("f-datepreset").children].forEach(x=>x.classList.remove("on"));}

function applyFilters(){
  return DATA.filter(r=>{
    if(state.centre.size && !state.centre.has(r.centre||"(blank)")) return false;
    if(state.program.size && !state.program.has(r.program||"(blank)")) return false;
    if(state.from){ if(!r.date || r.date < state.from) return false; }
    if(state.to){ if(!r.date || r.date > state.to) return false; }
    return true;
  });
}

const KPIS=[
  {key:"total",   label:"Total Leads",     cls:"acc", test:()=>true},
  {key:"visited", label:"School Visited",  cls:"grn", test:r=>SCHOOL_VISITED.has(r.status), sub:"Enrolled + Lost-after-visit + Visit done"},
  {key:"enrolled",label:"Enrolled",        cls:"grn", test:r=>r.status==="Enrolled"},
  {key:"walkin",  label:"Walk-ins",        cls:"wrn", test:r=>r.walkin===1},
  {key:"active",  label:"Active Pipeline", cls:"",    test:r=>ACTIVE.has(r.status)},
  {key:"future",  label:"Future Prospect", cls:"",    test:r=>r.status==="Future Prospect"},
  {key:"lost",    label:"Lead Lost",       cls:"bad", test:r=>r.status==="Lead lost"},
  {key:"dq",      label:"Disqualified",    cls:"",    test:r=>r.status==="Disqualified"},
  {key:"nostatus",label:"No Status",       cls:"wrn", test:isNoStatus, sub:"Needs tagging"},
];
function renderKpis(rows){
  const host=document.getElementById("kpis"); host.innerHTML="";
  KPIS.forEach(k=>{
    const subset=rows.filter(k.test);
    const card=document.createElement("div"); card.className="kpi "+k.cls;
    card.innerHTML=`<div class="v">${subset.length}</div><div class="l">${k.label}</div>`+(k.sub?`<div class="sub2">${k.sub}</div>`:"");
    card.onclick=()=>openModal(k.label+" ("+subset.length+" leads)", subset);
    host.appendChild(card);
  });
}

function barChart(title,key,rows,limit){
  const m=new Map();
  rows.forEach(r=>{const v=r[key]||"(blank)"; m.set(v,(m.get(v)||0)+1);});
  let arr=[...m.entries()];
  if(key==="month") arr.sort((a,b)=>MONTH_ORDER.indexOf(a[0])-MONTH_ORDER.indexOf(b[0]));
  else arr.sort((a,b)=>b[1]-a[1]);
  if(limit) arr=arr.slice(0,limit);
  const max=Math.max(1,...arr.map(a=>a[1]));
  const bars=arr.map(([v,n])=>`<div class="bar" data-key="${key}" data-val="${encodeURIComponent(v)}"><div class="lab" title="${v}">${v}</div><div class="track"><div class="fill" style="width:${n/max*100}%"></div></div><div class="val">${n}</div></div>`).join("");
  return `<div class="card"><h4><span>${title}</span><span class="muted">${arr.length}</span></h4>${bars||'<div class="muted">No data</div>'}</div>`;
}
function renderCharts(rows){
  const host=document.getElementById("charts");
  host.innerHTML=
    barChart("Leads by Status","status",rows)+
    barChart("Leads by Month","month",rows)+
    barChart("Leads by Source","source",rows)+
    barChart("Top Channels","channel",rows,8)+
    barChart("Leads by Centre","centre",rows)+
    barChart("Leads by Program","program",rows);
  host.querySelectorAll(".bar").forEach(b=>{
    b.onclick=()=>{
      const key=b.dataset.key, val=decodeURIComponent(b.dataset.val);
      const subset=rows.filter(r=>(r[key]||"(blank)")===val);
      openModal(key.charAt(0).toUpperCase()+key.slice(1)+": "+val+" ("+subset.length+" leads)", subset);
    };
  });
}

const COLS=[["date","Date"],["name","Parent"],["centre","Centre"],["phone","Phone"],["child","Child"],["source","Source"],["channel","Channel"],["program","Program"],["status","Status"],["month","Month"],["walkin","WI"],["enrolled","Enr"]];
let sortKey="date", sortDir=-1;
function pillClass(s){s=(s||"").toLowerCase();
  if(s.includes("enrol"))return"enr"; if(s.includes("lost"))return"lost";
  if(s.includes("disqual"))return"dq"; if(s.includes("follow")||s.includes("hot")||s.includes("scheduled")||s.includes("visit"))return"fu";
  return"oth";}
function rowHtml(r){return `<tr>
    <td>${r.date||""}</td><td>${r.name||""}</td><td>${r.centre}</td><td class="muted">${r.phone||""}</td>
    <td>${r.child||""}</td><td>${r.source||""}</td><td>${r.channel||""}</td><td>${r.program}</td>
    <td><span class="pill ${pillClass(r.status)}">${r.status}</span></td><td>${r.month||""}</td>
    <td>${r.walkin?'<span class="yes">Y</span>':'<span class="no">-</span>'}</td>
    <td>${r.enrolled?'<span class="yes">Y</span>':'<span class="no">-</span>'}</td></tr>`;}
function headHtml(active){return "<tr>"+COLS.map(([k,l])=>`<th data-k="${k}">${l}${active&&sortKey===k?(sortDir>0?" ^":" v"):""}</th>`).join("")+"</tr>";}
function renderTable(rows){
  const thead=document.querySelector("#tbl thead");
  thead.innerHTML=headHtml(true);
  thead.querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k; if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1;} render();});
  const sorted=[...rows].sort((a,b)=>{let x=a[sortKey],y=b[sortKey];
    if(typeof x==="number"&&typeof y==="number")return(x-y)*sortDir;
    return String(x).localeCompare(String(y))*sortDir;});
  document.querySelector("#tbl tbody").innerHTML=sorted.map(rowHtml).join("");
  document.getElementById("tcount").textContent=`${rows.length} of ${DATA.length} leads shown`;
}

function openModal(title, leads){
  document.getElementById("m-title").textContent=title;
  document.querySelector("#m-tbl thead").innerHTML=headHtml(false);
  const sorted=[...leads].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  document.querySelector("#m-tbl tbody").innerHTML= sorted.length? sorted.map(rowHtml).join("") : `<tr><td colspan="12" class="muted" style="padding:18px">No leads.</td></tr>`;
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){document.getElementById("overlay").classList.remove("open");}
document.getElementById("m-close").onclick=closeModal;
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

function render(){
  CURRENT=applyFilters();
  renderKpis(CURRENT); renderCharts(CURRENT); renderTable(CURRENT);
}
document.getElementById("date-from").onchange=e=>{state.from=e.target.value; clearPresetHighlight(); render();};
document.getElementById("date-to").onchange=e=>{state.to=e.target.value; clearPresetHighlight(); render();};
document.getElementById("reset").onclick=()=>{
  state.centre.clear(); state.program.clear(); state.from=""; state.to="";
  document.getElementById("date-from").value=""; document.getElementById("date-to").value="";
  buildChips("f-centre","centre"); buildChips("f-program","program"); buildDatePresets(); render();
};
document.getElementById("meta").textContent=`${DATA.length} leads loaded`;
buildChips("f-centre","centre"); buildChips("f-program","program"); buildDatePresets(); render();
</script>
</body>
