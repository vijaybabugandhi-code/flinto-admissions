    '<div class="ib" style="border-left:4px solid #27AE60"><h3 style="color:#27AE60;margin-bottom:8px">What's Working</h3><p>Overall conv: '+convPct+'% (of tagged)<br>Visit-to-enroll: '+vcpct+'%<br>Top program: '+(topProg?topProg[0]:'N/A')+'<br>Thoraipakkam: '+thorTot+' leads, '+thorSV+' visited, '+thorEnr+' enrolled<br>Tansi Nagar: '+tansiTot+' leads, '+tansiSV+' visited, '+tansiEnr+' enrolled</p></div>'+
    '<div class="ib" style="border-left:4px solid #E74C3C"><h3 style="color:#E74C3C;margin-bottom:8px">Flags</h3><p>'+lost+' leads lost/disqualified<br>'+active+' active leads need follow-up<br>'+(sv-enrolled)+' visited but not enrolled<br>'+noStCnt+' leads missing status tag</p></div>'+
    '<div class="ib" style="border-left:4px solid #F59E0B"><h3 style="color:#F59E0B;margin-bottom:8px">Due This Week</h3><p>'+hotR.filter(function(r){return r.status==="School visit done";}).length+' school visits done — follow up!<br>'+hotR.filter(function(r){return r.status==="Walkin scheduled";}).length+' walk-ins scheduled<br>RNR: '+(ovSt['RNR']||0)+' — retry contact</p></div>'+
    '<div class="ib" style="border-left:4px solid #7C3AED"><h3 style="color:#7C3AED;margin-bottom:8px">Pipeline</h3><p>Future Prospects: '+future+'<br>School Visited: '+sv+' ('+vcpct+'% enrolled)<br>Active pipeline: '+active+'<br>Hot-Payment expected: '+(ovSt['Hot-Payment expected']||0)+'</p></div>'+
    '</div>';
}

function applyFilters(){
  var cf=document.getElementById('cf').value;
  var mf=document.getElementById('mf').value;
  var parts=[];
  if(cf!=='all')parts.push(cf);
  if(mf!=='all')parts.push(MO[parseInt(mf)-1]);
  document.getElementById('filter-label').textContent=parts.length?'Filtered: '+parts.join(' · '):'Showing all data';
  render(cf,mf);
}

document.addEventListener('DOMContentLoaded',function(){render('all','all');});
</script>
